name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Existing tag to build and publish (e.g. v1.0.0). Use after adding signing secrets or to retry a failed release.'
        required: true
        type: string

jobs:
  android-apk:
    runs-on: ubuntu-latest
    # Quieter Node deprecation noise; checkout v6+ uses a supported runtime
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag || github.ref }}

      - name: Resolve release tag
        id: meta
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.release_tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Verify tag matches pubspec version
        env:
          TAG: ${{ steps.meta.outputs.tag }}
        run: |
          set -euo pipefail
          REF="$TAG"
          if [[ ! "$REF" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Tag must be vMAJOR.MINOR.PATCH (e.g. v1.0.0), got: $REF" >&2
            exit 1
          fi
          FULL="$(awk '/^version:/ { print $2; exit }' pubspec.yaml)"
          NAME="${FULL%%+*}"
          NUMBER="${FULL#*+}"
          EXPECTED="v${NAME}"
          if [ "$REF" != "${EXPECTED}" ]; then
            echo "Git tag must be ${EXPECTED} to match pubspec version line (got ${REF}, pubspec has ${FULL})" >&2
            exit 1
          fi
          echo "PUBSPEC_VERSION_NAME=$NAME" >> "$GITHUB_ENV"
          echo "PUBSPEC_BUILD_NUMBER=$NUMBER" >> "$GITHUB_ENV"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Decode keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "ANDROID_KEYSTORE_BASE64 secret is not set" >&2
            exit 1
          fi
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > android/upload-keystore.jks

      - name: Write key.properties
        env:
          STORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          if [ -z "$STORE_PASSWORD" ] || [ -z "$KEY_PASSWORD" ] || [ -z "$KEY_ALIAS" ]; then
            echo "ANDROID_KEYSTORE_PASSWORD, ANDROID_KEY_PASSWORD, and ANDROID_KEY_ALIAS secrets must be set" >&2
            exit 1
          fi
          {
            echo "storePassword=$STORE_PASSWORD"
            echo "keyPassword=$KEY_PASSWORD"
            echo "keyAlias=$KEY_ALIAS"
            echo "storeFile=upload-keystore.jks"
          } > android/key.properties

      - name: Install dependencies
        run: flutter pub get

      - name: Build release APK
        run: |
          flutter build apk --release \
            --build-name="$PUBSPEC_VERSION_NAME" \
            --build-number="$PUBSPEC_BUILD_NUMBER"

      - name: Print signing certificate fingerprint (copy SHA-256 into README)
        run: |
          BT="$(ls "$ANDROID_HOME/build-tools" | sort -V | tail -1)"
          "$ANDROID_HOME/build-tools/$BT/apksigner" verify --print-certs \
            build/app/outputs/flutter-apk/app-release.apk

      - name: Prepare versioned APK for release
        env:
          TAG: ${{ steps.meta.outputs.tag }}
        run: |
          set -euo pipefail
          OUT="metrotuner-${TAG}.apk"
          cp build/app/outputs/flutter-apk/app-release.apk "$OUT"
          test -f "$OUT"
          ls -la "$OUT"

      - name: Upload APK to GitHub Release
        uses: softprops/action-gh-release@v2.6.1
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: MetroTuner ${{ steps.meta.outputs.tag }}
          body: |
            Download **metrotuner-${{ steps.meta.outputs.tag }}.apk** for sideloading (e.g. Obtanium). The “Source code” zip/tar.gz entries are added by GitHub automatically and are not the app binary.
          files: metrotuner-${{ steps.meta.outputs.tag }}.apk
          draft: false
          prerelease: false
          fail_on_unmatched_files: true
          generate_release_notes: true
          make_latest: true
